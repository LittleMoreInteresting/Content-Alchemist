name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # 构建 Windows 版本
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23.4'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      # 👇 新增：显式编译前端代码 (Vite/React/Vue等)
      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # 👇 新增：验证 dist 目录是否成功生成。如果没生成，Action 会在这里直接报错，方便排查
      - name: Verify Frontend Dist Directory
        run: dir frontend\dist

        - name: Build Windows AMD64
        run: |
          wails build -platform windows/amd64 -webview2 embed -debug -ldflags "-X main.version=${{ github.event.inputs.version || github.ref_name }}" -o Content-Alchemist.exe

      - name: Build Windows AMD64 Installer
        run: |
          wails build -platform windows/amd64 -webview2 embed -debug -ldflags "-X main.version=${{ github.event.inputs.version || github.ref_name }}" -nsis -o Content-Alchemist-Setup.exe

      - name: Build Windows ARM64
        run: |
          wails build -platform windows/arm64 -webview2 embed -debug -ldflags "-X main.version=${{ github.event.inputs.version || github.ref_name }}" -o Content-Alchemist-arm64.exe

      - name: Calculate Checksums
        run: |
          cd build/bin
          certutil -hashfile Content-Alchemist.exe SHA256 > Content-Alchemist-windows-amd64.exe.sha256
          certutil -hashfile Content-Alchemist-Setup.exe SHA256 > Content-Alchemist-windows-amd64-setup.exe.sha256
          certutil -hashfile Content-Alchemist-arm64.exe SHA256 > Content-Alchemist-windows-arm64.exe.sha256

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            build/bin/Content-Alchemist.exe
            build/bin/Content-Alchemist-Setup.exe
            build/bin/Content-Alchemist-arm64.exe
            build/bin/*.sha256
          retention-days: 1

  # 构建 macOS 版本
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23.4'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      # 👇 新增：显式编译前端代码
      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # 👇 新增：验证 dist 目录是否成功生成 (macOS 下使用 ls 命令)
      - name: Verify Frontend Dist Directory
        run: ls -la frontend/dist

      - name: Build macOS AMD64
        run: |
          wails build -platform darwin/amd64 -ldflags "-X main.version=${{ github.event.inputs.version || github.ref_name }}"
          cd build/bin
          zip -r Content-Alchemist-macos-amd64.zip Content-Alchemist.app

      - name: Build macOS ARM64
        run: |
          wails build -platform darwin/arm64 -ldflags "-X main.version=${{ github.event.inputs.version || github.ref_name }}"
          cd build/bin
          zip -r Content-Alchemist-macos-arm64.zip Content-Alchemist.app

      - name: Calculate Checksums
        run: |
          cd build/bin
          shasum -a 256 Content-Alchemist-macos-amd64.zip > Content-Alchemist-macos-amd64.zip.sha256
          shasum -a 256 Content-Alchemist-macos-arm64.zip > Content-Alchemist-macos-arm64.zip.sha256

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            build/bin/Content-Alchemist-macos-amd64.zip
            build/bin/Content-Alchemist-macos-arm64.zip
            build/bin/*.sha256
          retention-days: 1

  # 创建并发布 Release
  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: ./artifacts/windows

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: ./artifacts/macos

      - name: List Artifacts
        run: |
          echo "=== Windows Artifacts ==="
          ls -la ./artifacts/windows/
          echo ""
          echo "=== macOS Artifacts ==="
          ls -la ./artifacts/macos/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Content Alchemist ${{ steps.get_version.outputs.version }}
          tag_name: ${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'rc') }}
          generate_release_notes: true
          files: |
            ./artifacts/windows/Content-Alchemist.exe
            ./artifacts/windows/Content-Alchemist-Setup.exe
            ./artifacts/windows/Content-Alchemist-arm64.exe
            ./artifacts/windows/*.sha256
            ./artifacts/macos/Content-Alchemist-macos-amd64.zip
            ./artifacts/macos/Content-Alchemist-macos-arm64.zip
            ./artifacts/macos/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        if: success()
        run: |
          echo "✅ Release created successfully!"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.version }}"