name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # 创建 Release Draft
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate Changelog
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          # 获取上一个 tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            # 如果没有上一个 tag，获取所有提交
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          else
            # 获取两个 tag 之间的提交
            COMMITS=$(git log --pretty=format:"- %s" --no-merges ${PREVIOUS_TAG}..HEAD)
          fi

          # 分类提交
          FEATURES=$(echo "$COMMITS" | grep -E "^-( feat|feature|新增)" || true)
          FIXES=$(echo "$COMMITS" | grep -E "^-( fix|bug|修复)" || true)
          DOCS=$(echo "$COMMITS" | grep -E "^-( docs|doc|文档)" || true)
          OTHERS=$(echo "$COMMITS" | grep -v -E "^-( feat|feature|新增|fix|bug|修复|docs|doc|文档)" || true)

          # 构建 changelog
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "## What's New" >> $GITHUB_ENV

          if [ -n "$FEATURES" ]; then
            echo "" >> $GITHUB_ENV
            echo "### ✨ 新功能" >> $GITHUB_ENV
            echo "$FEATURES" >> $GITHUB_ENV
          fi

          if [ -n "$FIXES" ]; then
            echo "" >> $GITHUB_ENV
            echo "### 🐛 修复" >> $GITHUB_ENV
            echo "$FIXES" >> $GITHUB_ENV
          fi

          if [ -n "$DOCS" ]; then
            echo "" >> $GITHUB_ENV
            echo "### 📝 文档" >> $GITHUB_ENV
            echo "$DOCS" >> $GITHUB_ENV
          fi

          if [ -n "$OTHERS" ]; then
            echo "" >> $GITHUB_ENV
            echo "### 🔧 其他" >> $GITHUB_ENV
            echo "$OTHERS" >> $GITHUB_ENV
          fi

          echo "" >> $GITHUB_ENV
          echo "**完整变更日志**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG:-HEAD}...${VERSION}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Content Alchemist ${{ steps.get_version.outputs.version }}
          body: ${{ env.CHANGELOG }}
          draft: true
          prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'rc') }}

  # 构建 Windows 版本
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23.4'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows AMD64
        run: |
          wails build -platform windows/amd64 -ldflags "-X main.version=${{ needs.create-release.outputs.version }}" -o Content-Alchemist.exe

      - name: Build Windows ARM64
        run: |
          wails build -platform windows/arm64 -ldflags "-X main.version=${{ needs.create-release.outputs.version }}" -o Content-Alchemist-arm64.exe

      - name: Upload Windows AMD64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./build/bin/Content-Alchemist.exe
          asset_name: Content-Alchemist-${{ needs.create-release.outputs.version }}-windows-amd64.exe
          asset_content_type: application/octet-stream

      - name: Upload Windows ARM64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./build/bin/Content-Alchemist-arm64.exe
          asset_name: Content-Alchemist-${{ needs.create-release.outputs.version }}-windows-arm64.exe
          asset_content_type: application/octet-stream

  # 构建 macOS 版本
  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23.4'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build macOS AMD64
        run: |
          wails build -platform darwin/amd64 -ldflags "-X main.version=${{ needs.create-release.outputs.version }}"
          cd build/bin
          zip -r Content-Alchemist-macos-amd64.zip Content-Alchemist.app

      - name: Build macOS ARM64
        run: |
          wails build -platform darwin/arm64 -ldflags "-X main.version=${{ needs.create-release.outputs.version }}"
          cd build/bin
          zip -r Content-Alchemist-macos-arm64.zip Content-Alchemist.app

      - name: Upload macOS AMD64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./build/bin/Content-Alchemist-macos-amd64.zip
          asset_name: Content-Alchemist-${{ needs.create-release.outputs.version }}-macos-amd64.zip
          asset_content_type: application/zip

      - name: Upload macOS ARM64
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./build/bin/Content-Alchemist-macos-arm64.zip
          asset_name: Content-Alchemist-${{ needs.create-release.outputs.version }}-macos-arm64.zip
          asset_content_type: application/zip

  # 构建 Linux 版本
  # build-linux:
  #   needs: create-release
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4

  #     - name: Setup Go
  #       uses: actions/setup-go@v5
  #       with:
  #         go-version: '1.23'

  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: '20'
  #         cache: 'npm'
  #         cache-dependency-path: frontend/package-lock.json

  #     - name: Install Dependencies
  #       run: |
  #         sudo apt-get update
  #         sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

  #     - name: Install Wails
  #       run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

  #     - name: Install Frontend Dependencies
  #       working-directory: frontend
  #       run: npm ci

  #     - name: Build Linux AMD64
  #       run: |
  #         wails build -platform linux/amd64 -ldflags "-X main.version=${{ needs.create-release.outputs.version }}"
  #         cd build/bin
  #         tar -czf Content-Alchemist-linux-amd64.tar.gz Content-Alchemist

  #     - name: Upload Linux AMD64
  #       uses: actions/upload-release-asset@v1
  #       env:
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  #       with:
  #         upload_url: ${{ needs.create-release.outputs.upload_url }}
  #         asset_path: ./build/bin/Content-Alchemist-linux-amd64.tar.gz
  #         asset_name: Content-Alchemist-${{ needs.create-release.outputs.version }}-linux-amd64.tar.gz
  #         asset_content_type: application/gzip

  # 完成 Release
  finalize-release:
    needs: [create-release, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: always() && needs.create-release.result == 'success'
    steps:
      - name: Update Release Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseId = '${{ needs.create-release.outputs.upload_url }}'.split('/').pop();
            const allSuccess = '${{ needs.build-windows.result }}' === 'success' &&
                              '${{ needs.build-macos.result }}' === 'success' &&
                              '${{ needs.build-linux.result }}' === 'success';

            if (allSuccess) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                draft: false
              });
              console.log('✅ Release published successfully!');
            } else {
              console.log('⚠️ Some builds failed. Release remains in draft state.');
            }
